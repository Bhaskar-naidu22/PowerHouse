openapi: 3.0.0
info:
  title: FieldLink API
  version: 1.0.0
  description: API specification for FieldLink electrical infrastructure onboarding app

servers:
  - url: /api

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Authentication and user management
  - name: Buildings
    description: Building and flat selection
  - name: Sensors
    description: Sensor registration and configuration

paths:

  # ─────────────────────────────────────────
  # AUTH
  # ─────────────────────────────────────────

  FieldLink/api/auth/login:
    post:
      summary: Authenticate user
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestDto'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponseDto'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '423':
          description: Account locked due to too many failed attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  FieldLink/api/auth/signup:
    post:
      summary: Register a new electrician/user
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequestDto'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignUpResponseDto'
        '409':
          description: Email or phone number already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignUpFailureResponseDto'

  FieldLink/api/auth/reset-password:
    post:
      summary: Trigger OTP-based password reset to registered mobile
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequestDto'
      responses:
        '200':
          description: OTP sent to registered mobile number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetPasswordResponseDto'
        '404':
          description: No account found for this email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─────────────────────────────────────────
  # BUILDINGS
  # ─────────────────────────────────────────

  /buildings:
    get:
      summary: Fetch buildings list — loaded on Flat Selection screen init
      tags: [Buildings]
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildingsListResponseDto'

  /buildings/{buildingId}/flats:
    get:
      summary: Fetch flats for a building with sensor allocation summary
      tags: [Buildings]
      parameters:
        - in: path
          name: buildingId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Flats with block grouping and sensor counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlatsListResponseDto'
        '404':
          description: Building not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # SENSORS

  /flats/{flatId}/registeredSensors:
    get:
      summary: Get all sensors already registered for a flat
      tags: [Sensors]
      parameters:
        - in: path
          name: flatId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of registered sensors for the flat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisteredSensorsResponseDto'
        '404':
          description: Flat not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /flats/{flatId}/switchBoards:
    get:
      summary: Fetch authorised switchboards for relay configuration (Relay sensor only)
      tags: [Sensors]
      parameters:
        - in: path
          name: flatId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of authorised switchboards for this flat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwitchBoardsResponseDto'
        '404':
          description: Flat not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /flats/{flatId}/devices:
    post:
      summary: Register a sensor device to a flat
      description:
        Registers a BLE-discovered device to the specified flat.
        Increments the flat's registered sensor count for the given sensor type.
        Validates that registeredCount < allocatedCount before saving.
        For Relay sensors, phaseType and switchName are required.
      tags: [Sensors]
      parameters:
        - in: path
          name: flatId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDeviceRequestDto'
      responses:
        '201':
          description: Device registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterDeviceResponseDto'
        '400':
          description: Validation error or missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Sensor type already fully registered for this flat (registered >= allocated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Flat or building not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


# COMPONENTS

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ── Auth ──────────────────────────────

    LoginRequestDto:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        deviceId:
          type: string

    LoginResponseDto:
      type: object
      properties:
        jwt:
          type: string
        profile:
          $ref: '#/components/schemas/UserProfileDto'

    UserProfileDto:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        phoneNumber:
          type: string
        role:
          type: string
          enum: [electrician, admin]

    SignUpRequestDto:
      type: object
      required: [email, phoneNumber, name]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phoneNumber:
          type: string
          pattern: '^\+[1-9]\d{7,14}$'

    SignUpSuccessResponseDto:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        message:
          type: string

    SignUpFailureResponseDto:
      type: object
      properties:
        message:
          type: string

    ResetPasswordRequestDto:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordResponseDto:
      type: object
      properties:
        message:
          type: string
        maskedPhone:
          type: string

    # ── Buildings ─────────────────────────

    BuildingsListResponseDto:
      type: object
      properties:
        buildings:
          type: array
          items:
            $ref: '#/components/schemas/BuildingSummaryDto'

    BuildingSummaryDto:
      type: object
      properties:
        buildingId:
          type: string
          format: uuid
        buildingName:
          type: string

    FlatsListResponseDto:
      type: object
      properties:
        buildingId:
          type: string
          format: uuid
        buildingName:
          type: string
        blocks:
          type: array
          description: Optional — only present if building has named blocks
          items:
            $ref: '#/components/schemas/BlockDto'
        flats:
          type: array
          description: Flats not grouped under a block (if no blocks exist)
          items:
            $ref: '#/components/schemas/FlatSummaryDto'

    BlockDto:
      type: object
      properties:
        blockId:
          type: string
          format: uuid
        blockName:
          type: string
          example: "Block A"
        flats:
          type: array
          items:
            $ref: '#/components/schemas/FlatSummaryDto'

    FlatSummaryDto:
      type: object
      properties:
        flatId:
          type: string
          format: uuid
        flatNumber:
          type: string
        totalSensorsAllocated:
          type: integer
        totalSensorsRegistered:
          type: integer
        sensorsRemaining:
          type: integer

    # ── Sensors ───────────────────────────

    RegisteredSensorsResponseDto:
      type: object
      properties:
        flatId:
          type: string
          format: uuid
        flatNumber:
          type: string
        allocatedSensors:
          type: array
          items:
            $ref: '#/components/schemas/SensorAllocationDto'

    SensorAllocationDto:
      type: object
      properties:
        sensorType:
          type: string
          enum: [ir_sensor, temperature, relay, camera, gas_leak, unknown]
        allocated:
          type: integer
        registered:
          type: integer
        remaining:
          type: integer
        registeredDevices:
          type: array
          items:
            $ref: '#/components/schemas/RegisteredDeviceDto'

    RegisteredDeviceDto:
      type: object
      properties:
        deviceId:
          type: string
          format: uuid
        sensorName:
          type: string
        macAddress:
          type: string
        registeredAt:
          type: string
          format: date-time
        registeredBy:
          type: string
          format: uuid

    SwitchBoardsResponseDto:
      type: object
      properties:
        flatId:
          type: string
          format: uuid
        switchBoards:
          type: array
          items:
            $ref: '#/components/schemas/SwitchBoardDto'

    SwitchBoardDto:
      type: object
      properties:
        switchBoardId:
          type: string
          format: uuid
        switchBoardName:
          type: string
        location:
          type: string

    RegisterDeviceRequestDto:
      type: object
      required: [buildingId, flatId, sensorName, sensorId, sensorType]
      properties:
        buildingId:
          type: string
          format: uuid
        flatId:
          type: string
          format: uuid
        sensorName:
          type: string
        sensorId:
          type: string
        sensorType:
          type: string
          enum: [ir_sensor, temperature, relay, camera, gas_leak]
        macAddress:
          type: string
        # Relay-only fields
        phaseType:
          type: string
        switchName:
          type: string
        switchBoardId:
          type: string
          format: uuid

    RegisterDeviceResponseDto:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            buildingId:
              type: string
              format: uuid
            buildingName:
              type: string
            flatId:
              type: string
              format: uuid
            flatNumber:
              type: string
            sensorName:
              type: string
            sensorType:
              type: string
            totalSensorsAllocated:
              type: integer
            totalSensorsRegistered:
              type: integer
            isFullyProvisioned:
              type: boolean


    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        errorCode:
          type: string
        message:
          type: string